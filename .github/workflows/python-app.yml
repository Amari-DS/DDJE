# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Создать GitHub Release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  APP_VERSION: "1.0.0" 

jobs:
  build:

    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Build EXE with PyInstaller
        run: python -m PyInstaller app.spec
      - name: Rename EXE with Build Number
        shell: pwsh
        run: |
          $buildNum = "${{ github.run_number }}"
          $fullVersion = "${{ env.APP_VERSION }}-${{ github.run_number }}"
          Get-ChildItem "dist/*.exe" | Rename-Item -NewName { $_.BaseName + "_" + $fullVersion + $_.Extension }
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ddje-app
          path: dist/*.exe
      - name: Release Manual Build
        uses: softprops/action-gh-release@v2
        if: github.event.inputs.make_release == 'true'
        with:
          files: dist/*.exe
          tag_name: "v${{ env.APP_VERSION }}-${{ github.run_number }}"
          name: "Release v${{ env.APP_VERSION }}-${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
